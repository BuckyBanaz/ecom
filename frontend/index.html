  <!-- Hide the default Google Translate top banner / iframe but keep the
       translation engine itself active (driven by the googtrans cookie). -->
  <style>
    /* Hide the floating banner frame */
    .goog-te-banner-frame,
    .goog-te-banner-frame.skiptranslate,
    iframe.goog-te-banner-frame,
    .goog-te-ftab,
    #goog-gt-tt,
    .goog-tooltip,
    .goog-tooltip:hover,
    .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
    .VIpgJd-ZVi9od-aZ2wEe-OiiCO {
      display: none !important;
      visibility: hidden !important;
    }
    /* Reset body offset that Google adds when the banner is shown */
    body { top: 0 !important; position: static !important; }
    /* Remove the highlight Google adds to translated text */
    .goog-text-highlight { background: none !important; box-shadow: none !important; }
  </style>
</head>

  <body>
    <div id="root"></div>
    <!-- Hidden mount point for the Google Translate widget. The custom
         LanguageSwitcher in the React app drives it programmatically so the
         dynamic API content (Dutch) can also be translated on-demand. -->
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        // eslint-disable-next-line no-undef
        new google.translate.TranslateElement(
          {
            pageLanguage: 'nl',
            includedLanguages: 'en,nl',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          },
          'google_translate_element'
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
