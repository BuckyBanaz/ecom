# Run on VPS: docker compose -f docker-compose.jenkins.yml up -d --build
# Jenkins UI: https://jenkins.<DOMAIN>  (via Caddy — port 8080 not public)
services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: ecom-jenkins:lts
    container_name: ecom-jenkins
    restart: unless-stopped
    user: root
    # No host ports — only reachable via Caddy at https://jenkins.<DOMAIN> on ecom_net
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ecom:/opt/ecom
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    env_file:
      - .env.production
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      - ecom_net

networks:
  ecom_net:
    external: true
    name: ecom_net

volumes:
  jenkins_home:
