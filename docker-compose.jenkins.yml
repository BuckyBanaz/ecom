# Run on VPS: docker compose -f docker-compose.jenkins.yml up -d --build
# Jenkins is NOT public — bind localhost only. Access via SSH tunnel:
#   ssh -L 8080:127.0.0.1:8080 root@187.124.21.137
# Then open: http://localhost:8080
services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: ecom-jenkins:lts
    container_name: ecom-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ecom:/opt/ecom
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    group_add:
      - "${DOCKER_GID:-999}"

volumes:
  jenkins_home:
