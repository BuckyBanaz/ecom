# Run on VPS: docker compose -f docker-compose.jenkins.yml up -d --build
# Jenkins UI: http://<VPS_IP>:8080
services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: ecom-jenkins:lts
    container_name: ecom-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/ecom:/opt/ecom
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    group_add:
      - "${DOCKER_GID:-999}"

volumes:
  jenkins_home:
