name: CI

on:
  push:
    branches: [v1.4, v1.3, main]
  pull_request:
    branches: [v1.4, v1.3, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (advisory — does not block deploy)
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Production build
        env:
          VITE_API_URL: https://api.schipenster.com
          VITE_APP_URL: https://schipenster.com
        run: npm run build

  backend:
    name: Backend — prisma + Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Verify Docker image builds
        run: docker build -t ecom-backend:ci ./backend

  docker-frontend:
    name: Frontend — Docker build
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker image builds
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.schipenster.com \
            --build-arg VITE_APP_URL=https://schipenster.com \
            -t ecom-frontend:ci \
            ./frontend
